<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>空港辰院 · 周边生活地图</title>
<meta name="theme-color" content="#E8577B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="周边生活地图">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23E8577B'/%3E%3Ctext x='50' y='50' text-anchor='middle' dy='0.08em' font-size='40'%3E🏠%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
  --pink-50: #FFF0F3; --pink-100: #FFE0E6; --pink-200: #FFB3C1;
  --pink-300: #FF8FA3; --pink-400: #E8577B; --pink-500: #C73E5F;
  --blue: #3388FF; --blue-dark: #2563EB; --purple: #8B5CF6;
  --text: #2D2D3F; --text-light: #6B6B80; --white: #FFFFFF;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.12); --radius-sm: 8px;
  --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--pink-50); color: var(--text); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

.header { height: 52px; background: var(--white); border-bottom: 1px solid var(--pink-100); display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 1000; position: relative; }
.header-logo { font-size: 18px; font-weight: 700; color: var(--pink-400); white-space: nowrap; }
.header-logo span { color: var(--text); font-weight: 500; font-size: 15px; }
.header-actions { margin-left: auto; display: flex; gap: 8px; }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.btn-primary { background: var(--pink-400); color: var(--white); }
.btn-primary:hover { background: var(--pink-500); transform: translateY(-1px); }
.btn-outline { background: var(--white); color: var(--pink-400); border: 1.5px solid var(--pink-200); }
.btn-outline:hover { background: var(--pink-50); }
.btn-outline.active { background: var(--pink-100); border-color: var(--pink-300); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: transparent; color: #E74C3C; border: 1px solid #FADBD8; }
.btn-danger:hover { background: #FADBD8; }

.main-container { display: flex; height: calc(100vh - 52px); }
.map-wrapper { flex: 1; position: relative; min-width: 0; }
.map-expand-btn { display: none; position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 1000; background: var(--white); color: var(--pink-400); border: 1.5px solid var(--pink-200); border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-md); font-family: inherit; white-space: nowrap; transition: all 0.2s; }
.map-expand-btn:hover { background: var(--pink-50); }
.map-expand-btn:active { transform: translateX(-50%) scale(0.95); }
#map { width: 100%; height: 100%; touch-action: manipulation; }

.custom-marker { background: var(--blue); border: 3px solid var(--white); border-radius: 50% 50% 50% 0; width: 32px; height: 32px; transform: rotate(-45deg); box-shadow: 0 2px 10px rgba(51,136,255,0.45); transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; }
.custom-marker:hover { transform: rotate(-45deg) scale(1.2); box-shadow: 0 4px 16px rgba(51,136,255,0.6); }
.custom-marker.favorited { background: var(--pink-400); box-shadow: 0 2px 10px rgba(232,87,123,0.45); }
.custom-marker.favorited:hover { box-shadow: 0 4px 16px rgba(232,87,123,0.6); }
.custom-marker::after { content: ''; position: absolute; width: 12px; height: 12px; background: var(--white); border-radius: 50%; top: 7px; left: 7px; }

.district-tooltip { background: rgba(45,45,63,0.85); color: #fff; border: none; border-radius: 6px; padding: 4px 10px; font-size: 13px; font-weight: 600; font-family: "PingFang SC","Microsoft YaHei",sans-serif; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.leaflet-tooltip.district-tooltip::before { border-top-color: rgba(45,45,63,0.85); }

.sidebar { width: 420px; background: var(--white); display: flex; flex-direction: column; border-left: 1px solid var(--pink-100); z-index: 999; }
.sidebar-search { padding: 16px 16px 12px; position: relative; }
.sidebar-search input { width: 100%; padding: 10px 14px 10px 38px; border: 1.5px solid var(--pink-100); border-radius: var(--radius); font-size: 14px; outline: none; font-family: inherit; background: var(--pink-50); transition: all 0.2s; }
.sidebar-search input:focus { border-color: var(--pink-300); background: var(--white); }
.sidebar-search .search-icon { position: absolute; left: 28px; top: 26px; color: var(--text-light); font-size: 15px; pointer-events: none; }

.filter-chips { display: flex; gap: 6px; padding: 0 16px 12px; flex-wrap: wrap; }
.chip { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--pink-100); background: var(--white); color: var(--text-light); transition: all 0.2s; font-family: inherit; }
.chip:hover { border-color: var(--pink-300); }
.chip.active { background: var(--pink-200); color: var(--pink-500); border-color: var(--pink-200); }
.chip.fav-filter { margin-left: auto; }
.chip.fav-filter.active { background: var(--pink-400); color: white; border-color: var(--pink-400); }

.card-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.card-list::-webkit-scrollbar { width: 5px; }
.card-list::-webkit-scrollbar-track { background: transparent; }
.card-list::-webkit-scrollbar-thumb { background: var(--pink-100); border-radius: 10px; }

.card { background: var(--white); border: 1.5px solid var(--pink-50); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; position: relative; }
.card:hover { border-color: var(--pink-200); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.card.highlight { border-color: var(--pink-400); background: #FFF5F7; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }
.card-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-restaurant { background: #FFF0E6; color: #E67E22; } .badge-mall { background: #E8F4FD; color: #2980B9; } .badge-entertainment { background: #EDE8FD; color: #7C3AED; }
.card-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-light); margin-bottom: 4px; flex-wrap: wrap; }
.card-address { font-size: 12px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.card-desc { font-size: 13px; color: var(--text-light); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-route { display: flex; gap: 12px; margin: 6px 0; font-size: 11px; color: var(--purple); flex-wrap: wrap; }
.card-route span { display: inline-flex; align-items: center; gap: 3px; background: #F5F0FF; padding: 3px 8px; border-radius: 10px; }
.card-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }

.stars { color: #F39C12; letter-spacing: 1px; font-size: 13px; }
.fav-icon { position: absolute; top: 12px; right: 12px; font-size: 18px; cursor: pointer; transition: transform 0.15s; user-select: none; z-index: 2; }
.fav-icon:hover { transform: scale(1.2); }
.fav-icon.active { animation: heartBeat 0.4s ease; }
@keyframes heartBeat { 0% { transform: scale(1); } 25% { transform: scale(1.3); } 50% { transform: scale(1); } 75% { transform: scale(1.2); } 100% { transform: scale(1); } }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.8; }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: var(--white); border-radius: var(--radius-xl); width: 500px; max-height: 82vh; overflow-y: auto; box-shadow: var(--shadow-lg); padding: 28px; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h2 { font-size: 20px; margin-bottom: 20px; color: var(--text); }
.modal h3 { font-size: 15px; margin: 16px 0 8px; color: var(--text); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-light); margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--pink-100); border-radius: var(--radius-sm); font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.2s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--pink-300); }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--pink-50); }
.coord-pick-hint { font-size: 12px; color: var(--pink-400); margin-top: 4px; }

.detail-section { margin-bottom: 16px; }
.detail-section h3 { font-size: 13px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
.detail-section p { font-size: 14px; line-height: 1.7; color: var(--text); }
.detail-section .review-card { background: var(--pink-50); padding: 12px 14px; border-radius: var(--radius-sm); margin-top: 8px; font-size: 13px; line-height: 1.6; }
.detail-section .review-source { font-size: 11px; color: var(--pink-400); font-weight: 600; margin-top: 4px; }
.detail-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
.detail-header .icon-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.icon-restaurant { background: #FFF0E6; } .icon-mall { background: #E8F4FD; } .icon-entertainment { background: #EDE8FD; }
.detail-image { width: 100%; border-radius: var(--radius); margin-bottom: 16px; max-height: 260px; object-fit: cover; cursor: pointer; background: var(--pink-50); }
.detail-image-placeholder { width: 100%; height: 160px; border-radius: var(--radius); margin-bottom: 16px; background: linear-gradient(135deg, var(--pink-50), var(--pink-100)); display: flex; align-items: center; justify-content: center; color: var(--pink-300); font-size: 40px; }
.route-info-bar { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
.route-info-item { display: flex; align-items: center; gap: 6px; background: #F5F0FF; padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; color: #6D28D9; font-weight: 500; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--white); padding: 10px 24px; border-radius: 20px; font-size: 14px; z-index: 9999; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 3000; display: flex; align-items: center; justify-content: center; }
.confirm-box { background: var(--white); padding: 24px 28px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); text-align: center; max-width: 340px; }
.confirm-box p { font-size: 15px; margin-bottom: 18px; line-height: 1.6; }
.confirm-box .btn-row { display: flex; gap: 10px; justify-content: center; }
@media (max-width: 768px) {
  .main-container { flex-direction: column; }
  .map-wrapper { height: 45vh; transition: height 0.3s ease; }
  .sidebar { width: 100%; flex: 1; border-left: none; border-top: 1px solid var(--pink-100); transition: all 0.3s ease; }
  .map-expand-btn { display: block; }
  .modal { width: 92vw; padding: 20px; max-height: 85vh; }
  .header { padding: 0 12px; }
  .header-logo { font-size: 15px; }
  .header-logo span { font-size: 12px; }
  .btn { padding: 10px 14px; font-size: 13px; }
  .btn-sm { padding: 8px 12px; font-size: 12px; }
  .chip { padding: 7px 14px; font-size: 13px; }
  .card { padding: 14px; }
  .card-actions .btn { padding: 8px 12px; font-size: 12px; }
  .leaflet-control-zoom { display: none; }
  /* expanded map mode */
  .main-container.map-expanded .map-wrapper { height: calc(100vh - 112px); }
  .main-container.map-expanded .sidebar { flex: 0 0 auto; max-height: 50px; overflow: hidden; }
  .main-container.map-expanded .sidebar > * { display: none; }
  .main-container.map-expanded .sidebar::before { content: '🔽 向下滑动查看列表'; display: flex; align-items: center; justify-content: center; height: 50px; font-size: 13px; color: var(--pink-400); font-weight: 600; cursor: pointer; }
  .main-container.map-expanded .map-expand-btn { bottom: 70px; }
}
@media (max-width: 400px) {
  .header-actions { gap: 4px; }
  .header-actions .btn { padding: 7px 10px; font-size: 11px; }
  .filter-chips { gap: 4px; padding: 0 8px 8px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏠 <span>空港辰院 · 周边生活地图</span></div>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" id="btnShowFavorites" onclick="toggleFavFilter()">❤️ 只看收藏</button>
    <button class="btn btn-outline btn-sm" onclick="downloadPage()">📥 下载</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ 添加地点</button>
  </div>
</div>

<div class="main-container">
  <div class="map-wrapper">
    <div id="map"></div>
    <button class="map-expand-btn" onclick="toggleMapExpand()" id="mapExpandBtn">🗺️ 全屏地图</button>
  </div>
  <div class="sidebar">
    <div class="sidebar-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索地点名称、地址..." oninput="renderCards()">
    </div>
    <div class="filter-chips">
      <button class="chip active" onclick="setFilter('all', this)">全部</button>
      <button class="chip" onclick="setFilter('restaurant', this)">🍽️ 餐厅</button>
      <button class="chip" onclick="setFilter('mall', this)">🛍️ 商场</button>
      <button class="chip" onclick="setFilter('entertainment', this)">🎮 娱乐</button>
      <button class="chip sort-chip" id="sortChip" onclick="toggleSort()">🕐 最新</button>
      <button class="chip fav-filter" id="favChip" onclick="toggleFavFilter()">❤️ 收藏</button>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>
</div>

<div class="modal-overlay" id="addModal" style="display:none;">
  <div class="modal">
    <h2 id="modalTitle">添加新地点</h2>
    <div class="form-group"><label>名称 *</label><input type="text" id="formName" placeholder="例如：海底捞火锅"></div>
    <div class="form-row">
      <div class="form-group"><label>分类 *</label><select id="formCategory"><option value="restaurant">🍽️ 餐厅</option><option value="mall">🛍️ 商场</option><option value="entertainment">🎮 娱乐</option></select></div>
      <div class="form-group"><label>评分</label><select id="formRating"><option value="5">⭐⭐⭐⭐⭐ (5分)</option><option value="4" selected>⭐⭐⭐⭐ (4分)</option><option value="3">⭐⭐⭐ (3分)</option><option value="2">⭐⭐ (2分)</option><option value="1">⭐ (1分)</option></select></div>
    </div>
    <div class="form-group"><label>地址</label><input type="text" id="formAddress" placeholder="例如：金水区花园路122号"></div>
    <div class="form-group"><label>电话</label><input type="text" id="formPhone" placeholder="例如：0371-12345678"></div>
    <div class="form-group"><label>图片URL（可从小红书/大众点评复制图片链接）</label><input type="text" id="formImage" placeholder="粘贴图片链接，用于展示该地点的照片"></div>
    <div class="form-group"><label>简介描述</label><textarea id="formDesc" placeholder="简单描述这个地方的特色..."></textarea></div>
    <div class="form-group"><label>用户评价（可从小红书/大众点评摘录）</label><textarea id="formReview" placeholder="粘贴用户评价..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>纬度</label><input type="text" id="formLat" placeholder="例如：34.537"></div>
      <div class="form-group"><label>经度</label><input type="text" id="formLng" placeholder="例如：113.845"></div>
    </div>
    <p class="coord-pick-hint">💡 点击地图上的位置自动获取经纬度</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="savePlace()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal" style="display:none;"><div class="modal" id="detailContent"></div></div>
<div class="confirm-overlay" id="confirmDialog" style="display:none;"><div class="confirm-box"><p id="confirmMsg"></p><div class="btn-row"><button class="btn btn-outline" onclick="hideConfirm()">取消</button><button class="btn btn-danger" onclick="confirmDelete()">确认删除</button></div></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const HOME_LAT=34.537,HOME_LNG=113.845,STORAGE_KEY='konggang_map_v4';

function loadPlaces(){
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    if(r){
      const existing=JSON.parse(r);
      const defs=getDefaults();
      const existIds=new Set(existing.map(p=>p.id));
      const newOnes=defs.filter(p=>!existIds.has(p.id));
      if(newOnes.length>0){
        const merged=[...existing,...newOnes];
        localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
        return merged;
      }
      return existing;
    }
    // migrate from v3
    const v3=localStorage.getItem('konggang_map_v3');
    if(v3){
      const old=JSON.parse(v3);
      const defs=getDefaults();
      const oldIds=new Set(old.map(p=>p.id));
      const newOnes=defs.filter(p=>!oldIds.has(p.id));
      const merged=[...old,...newOnes];
      localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
      return merged;
    }
    // migrate from v2
    const o=localStorage.getItem('konggang_map_places_v2');
    if(o){
      const old=JSON.parse(o);
      const defs=getDefaults();
      const oldIds=new Set(old.map(p=>p.id));
      const newOnes=defs.filter(p=>!oldIds.has(p.id));
      const merged=[...old,...newOnes];
      localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
      return merged;
    }
  }catch(e){}
  return getDefaults();
}
function savePlaces(){localStorage.setItem(STORAGE_KEY,JSON.stringify(places));}

function getDefaults(){
  const n=Date.now();
  const m=[// malls
    {id:'m01',name:'锦荣悦汇城',category:'mall',lat:34.535,lng:113.847,address:'航空港区雍州路与巡航路交叉口（地铁恩平湖站直达）',rating:4,desc:'港区最大商业综合体，200+品牌（优衣库/星巴克/海底捞/奥斯卡影城），约1.8万㎡影视拍摄基地。',review:'港区最好的商场，品牌全、四楼美食多。周末停车位紧张，最近新增影视基地很有趣！',image:'',favorited:false,createdAt:n-100},

    {id:'r49',name:'牛师傅羊排大虾火锅',category:'restaurant',lat:34.525,lng:113.852,address:'航空港区迎宾大道（近新郑机场）',rating:4,desc:'中牟风味第一名！羊排+大虾双拼火锅，汤底鲜香浓郁。羊排软烂脱骨，大虾鲜甜。人均¥48-80。',review:'羊排和大虾的组合太绝了！先啃羊排再涮菜，汤底鲜到不行。机场附近性价比最高的火锅。',image:'',favorited:false,createdAt:n-6900},
    {id:'r50',name:'丰源烩面',category:'restaurant',lat:34.540,lng:113.841,address:'航空港区长安路与洞庭湖路交叉口',rating:4,desc:'港区手工烩面老店！菌香栗子牛腩烩面是独创，滋补白汤底浓郁。手工扯面筋道有嚼头。人均¥18-30。',review:'菌香牛腩烩面太香了！汤底浓郁面条筋道，牛肉分量给得足。港区吃烩面就来这家。',image:'',favorited:false,createdAt:n-7000},

    {id:'r13',name:'曼玉融合餐厅 (大卫城店)',category:'restaurant',lat:34.760,lng:113.665,address:'二七区大卫城内',rating:5,desc:'郑州超火融合菜！约会首选。酸辣粉、蟹黄豆腐、榴莲芝士面包是招牌。环境精致。',review:'约会圣地！蟹黄豆腐嫩滑鲜美，榴莲芝士面包外酥里香。每道菜都精致好看。',image:'',favorited:false,createdAt:n-3300},
    {id:'r14',name:'张福记 (陇海中路店)',category:'restaurant',lat:34.745,lng:113.655,address:'二七区陇海中路',rating:4,desc:'老牌江浙菜馆，口味正宗。东坡肉、龙井虾仁、叫花鸡是经典。环境雅致适合家宴。',review:'郑州少有的正宗江浙菜！东坡肉肥而不腻，龙井虾仁清新爽口。家庭聚餐好选择。',image:'',favorited:false,createdAt:n-3400},
    {id:'r15',name:'葛记焖饼 (桐柏路店)',category:'restaurant',lat:34.760,lng:113.620,address:'中原区桐柏路',rating:5,desc:'源自清朝的非遗美食！坛子肉焖饼是招牌，入选大众点评必吃榜。人均¥40左右，性价比超高。',review:'非遗美食名不虚传！坛子肉焖饼香气扑鼻，饼软肉烂。每次回郑州都要来吃一碗！',image:'',favorited:false,createdAt:n-3500},
    {id:'r16',name:'四厂烤包子',category:'restaurant',lat:34.760,lng:113.630,address:'中原区国棉四厂家属院内',rating:4,desc:'郑州经典小吃！国棉四厂里的烤包子，外酥里嫩馅料足。排队是常态。',review:'藏在老厂区里的美食！烤包子外皮酥脆，羊肉馅多汁。等20分钟也值得！',image:'',favorited:false,createdAt:n-3600},

    {id:'r77',name:'逍遥镇刘相五胡辣汤豆沫馆 (康复中街店)',category:'restaurant',lat:34.752,lng:113.660,address:'二七区康复中街与中原路交叉口',rating:4,desc:'2025必吃榜！正宗逍遥镇胡辣汤，汤底浓稠香辣料足。配水煎包/油条是河南人标准早餐。人均¥8-15。',review:'郑州最好喝的胡辣汤之一！料超级足，牛肉片大块。配刚出锅的水煎包，早晨的幸福就是这么简单。',image:'',favorited:false,createdAt:n-9700},
    {id:'r78',name:'帖老大羊肉汤烩面烧烤 (康复后街总店)',category:'restaurant',lat:34.750,lng:113.655,address:'二七区康复后街与大学路交叉口',rating:4,desc:'2025必吃榜！30年老店，羊肉汤+烩面+烧烤一店三吃。羊肉现切现煮，烧烤炭火现烤。人均¥35-60。',review:'一店吃遍郑州味！羊肉汤白浓鲜，烩面筋道，烤串炭火香。聚餐首选，每个品类都做得好。',image:'',favorited:false,createdAt:n-9800},
    {id:'r79',name:'百鲜煎包·牛肉面',category:'restaurant',lat:34.748,lng:113.653,address:'二七区大学路与中原路交叉口',rating:4,desc:'2025必吃榜！生煎包外皮酥脆底，牛肉面汤浓面筋道。水煎包+牛肉面是经典套餐。人均¥20-35。',review:'生煎包底部煎得金黄酥脆，咬开汤汁四溢！牛肉面也是真材实料，汤底熬得很浓。性价比无敌。',image:'',favorited:false,createdAt:n-9900},
    {id:'r18',name:'须水邓记叫化鸡',category:'restaurant',lat:34.755,lng:113.640,address:'中原区须水镇',rating:4,desc:'河南老字号！烧鸡+猪蹄是招牌，年节必排长队。自制豆腐豆皮也超赞。人均¥50-80。',review:'老字号就是老字号！叫化鸡肉质鲜嫩入味，猪蹄软糯Q弹。过年必买，送人也体面。',image:'',favorited:false,createdAt:n-3800},

    {id:'r82',name:'食欲老院子',category:'restaurant',lat:34.755,lng:113.625,address:'中原区秦岭路与陇海路交叉口',rating:4,desc:'老厂房改造的文艺餐厅，院子+红砖+绿植。创意融合菜，环境出片率极高。人均¥80-130。',review:'老院子改造得太有感觉了！红砖墙+爬藤+露台，怎么拍都好看。菜品精致有创意，约会必选。',image:'',favorited:false,createdAt:n-10200},

    {id:'r20',name:'出云记',category:'restaurant',lat:34.750,lng:113.690,address:'管城区城东路',rating:4,desc:'藏在老院子里的网红菜馆，环境有格调，创意融合菜。入选大众点评必吃榜。',review:'老院子改的餐厅超有感觉！菜品精致有创意，每道都像艺术品。适合约会和小聚。',image:'',favorited:false,createdAt:n-4000},

    {id:'r28',name:'赵长征炒虾尾手擀面',category:'restaurant',lat:34.805,lng:113.705,address:'金水区天伦路与黄家庵东路交叉口',rating:4,desc:'一晚上卖掉上万只虾尾！秘制酱料爆炒+现擀手擀面蘸汤。下午4点营业到凌晨3点。人均¥50-80。',review:'虾尾炒得太香了！手擀面蘸汤汁吃绝了。深夜来一碗，人间值得。就是人太多要排队。',image:'',favorited:false,createdAt:n-4800},

    {id:'r52',name:'白堽羊肉 (红专路店)',category:'restaurant',lat:34.780,lng:113.685,address:'金水区红专路与经五路交叉口',rating:4,desc:'2025必吃榜！老牌羊肉馆，羊肉汤/羊肉烩面/手抓羊肉都是招牌。汤白肉嫩无膻味。人均¥35-60。',review:'羊肉汤熬得奶白浓郁，一点膻味没有！手抓羊肉蘸椒盐吃太香了，冬天来一碗暖到骨子里。',image:'',favorited:false,createdAt:n-7200},

// ==================== DISTANCE ====================
function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getRoute(p){
  const d=haversine(HOME_LAT,HOME_LNG,p.lat,p.lng);
  if(d<0.05)return{walkMin:1,driveMin:1,distKm:0};
  return{walkMin:Math.max(1,Math.round(d/5*60)),driveMin:Math.max(1,Math.round(d/30*60)),distKm:+d.toFixed(1)};
}
function fmtRoute(p){
  const r=getRoute(p);let dm=r.driveMin,wm=r.walkMin;
  if(p._ds)dm=Math.round(p._ds/60);if(p._ws)wm=Math.round(p._ws/60);
  const dl=dm>=60?Math.floor(dm/60)+'h'+(dm%60||'')+'min':dm+'分钟';
  const wl=wm>=60?Math.floor(wm/60)+'h'+(wm%60||'')+'min':wm+'分钟';
  return{driveLabel:dl,walkLabel:wl,distKm:r.distKm,driveMin:dm,walkMin:wm};
}
async function enrichRoutes(){
  const batch=places.filter(p=>!p._enriched);
  for(let i=0;i<batch.length;i+=3){
    const g=batch.slice(i,i+3);
    await Promise.allSettled(g.map(async p=>{
      try{const r=await fetch('https://router.project-osrm.org/route/v1/driving/'+HOME_LNG+','+HOME_LAT+';'+p.lng+','+p.lat+'?overview=false',{signal:AbortSignal.timeout(3000)});if(r.ok){const d=await r.json();if(d.routes?.[0]?.duration)p._ds=d.routes[0].duration}}catch(e){}
      try{const r=await fetch('https://router.project-osrm.org/route/v1/walking/'+HOME_LNG+','+HOME_LAT+';'+p.lng+','+p.lat+'?overview=false',{signal:AbortSignal.timeout(3000)});if(r.ok){const d=await r.json();if(d.routes?.[0]?.duration)p._ws=d.routes[0].duration}}catch(e){}
      p._enriched=true;
    }));
  }
  renderCards();
}

// district boundaries — 9-color pastel palette
const DISTRICT_COLORS=[
  {fill:'#FFFDE7',stroke:'#C8B900'}, // 淡黄
  {fill:'#FFF0F3',stroke:'#D4889E'}, // 淡粉
  {fill:'#F3E5F5',stroke:'#9B59B6'}, // 淡紫
  {fill:'#E8F5E9',stroke:'#5DA87D'}, // 淡绿
  {fill:'#E3F2FD',stroke:'#5DADE2'}, // 淡蓝
  {fill:'#FFF3E0',stroke:'#E67E22'}, // 淡橙
  {fill:'#FCE4EC',stroke:'#C0392B'}, // 淡桃
  {fill:'#E0F2F1',stroke:'#117864'}, // 淡青
  {fill:'#EDE7F6',stroke:'#7D3C98'}, // 淡灰紫
];
const NAME_TO_COLOR={
  '金水区':0,'二七区':1,'中原区':2,'管城回族区':3,'惠济区':4,
  '郑东新区':5,'高新区':6,'经开区':7,'航空港区':8,
  '上街区':5,'中牟县':6,'新郑市':7,'荥阳市':8,'新密市':0,'巩义市':1,'登封市':2,
};
let dLayer,cIdx=0;
function distStyle(f){
  const name=f.properties.name||'';
  const idx=NAME_TO_COLOR[name]!=null?NAME_TO_COLOR[name]:(cIdx++%9);
  const c=DISTRICT_COLORS[idx];
  return{color:c.stroke,weight:2.5,opacity:0.85,fillColor:c.fill,fillOpacity:0.35};
}
function distHoverStyle(f){
  const name=f.properties.name||'';
  const idx=NAME_TO_COLOR[name]!=null?NAME_TO_COLOR[name]:(cIdx++%9);
  const c=DISTRICT_COLORS[idx];
  return{color:c.stroke,weight:4.5,opacity:1,fillColor:c.fill,fillOpacity:0.55};
}
async function loadDistricts(){
  try{
    const r=await fetch('https://geo.datav.aliyun.com/areas_v3/bound/410100_full.json',{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return;
    const g=await r.json();
    dLayer=L.geoJSON(g,{style:distStyle,onEachFeature:(f,l)=>{
      l.bindTooltip(f.properties.name||'',{sticky:true,direction:'center',className:'district-tooltip'});
      l.on('mouseover',()=>l.setStyle(distHoverStyle(f)));
      l.on('mouseout',()=>l.setStyle(distStyle(f)));
    }}).addTo(map);
    console.log('✅ 郑州区县边界已加载');
  }catch(e){console.log('⚠️ 区县边界加载失败');}
}

  let h='<div style="min-width:220px;font-family:PingFang SC,sans-serif;">';
  h+='<b style="font-size:15px;">'+esc(p.name)+'</b><span style="margin-left:8px;font-size:11px;background:#FFF0F3;color:#E8577B;padding:2px 6px;border-radius:8px;">'+cat+'</span>';
  h+='<div style="margin-top:4px;font-size:13px;color:#6B6B80;">'+'⭐'.repeat(p.rating)+' '+p.rating+'分</div>';
  h+='<div style="margin-top:4px;font-size:11px;color:#9333EA;">🚗 '+rt.driveLabel+' | 🚶 '+rt.walkLabel+' | 📍 '+rt.distKm+'km</div>';
  if(p.address)h+='<div style="margin-top:4px;font-size:12px;color:#999;">📍 '+esc(p.address)+'</div>';
  h+='<div style="margin-top:8px;"><button onclick="openDetailModal(\''+p.id+'\')" style="padding:5px 14px;border:none;border-radius:8px;background:#E8577B;color:white;cursor:pointer;font-size:12px;font-family:inherit;">查看详情</button></div></div>';
  return h;
}
function refreshMarkers(){Object.values(markers).forEach(m=>map.removeLayer(m));markers={};places.forEach(createMarker);}

// ==================== CARDS ====================
function filtered(){
  let f=[...places];
  if(currentFilter!=='all')f=f.filter(p=>p.category===currentFilter);
  if(favFilterOnly)f=f.filter(p=>p.favorited);
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(q)f=f.filter(p=>p.name.toLowerCase().includes(q)||p.address.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q));
  if(sortMode==='distance')f.sort((a,b)=>haversine(HOME_LAT,HOME_LNG,a.lat,a.lng)-haversine(HOME_LAT,HOME_LNG,b.lat,b.lng));
  else f.sort((a,b)=>b.createdAt-a.createdAt);
  return f;
}
function renderCards(){
  const c=document.getElementById('cardList'),fl=filtered();
  if(!fl.length){c.innerHTML='<div class="empty-state"><div class="icon">📍</div><p>暂无地点</p><p style="font-size:12px;">点击右上角"添加地点"开始吧~</p></div>';return;}
  c.innerHTML=fl.map(p=>{
    const cl={restaurant:'🍽️ 餐厅',mall:'🛍️ 商场',entertainment:'🎮 娱乐'}[p.category];
    const cc={restaurant:'badge-restaurant',mall:'badge-mall',entertainment:'badge-entertainment'}[p.category];
    const rt=fmtRoute(p);
    return '<div class="card" id="card-'+p.id+'" onclick="focusPlace(\''+p.id+'\')">'
      +'<span class="fav-icon'+(p.favorited?' active':'')+'" onclick="event.stopPropagation();toggleFavorite(\''+p.id+'\')">'+(p.favorited?'❤️':'🤍')+'</span>'
      +'<div class="card-header"><span class="card-title">'+esc(p.name)+'</span><span class="card-badge '+cc+'">'+cl+'</span></div>'
      +'<div class="card-meta"><span class="stars">'+'⭐'.repeat(p.rating)+'</span><span>'+p.rating+'分</span></div>'
      +'<div class="card-route"><span>🚗 '+rt.driveLabel+'</span><span>🚶 '+rt.walkLabel+'</span><span>📍 '+rt.distKm+'km</span></div>'
      +(p.address?'<div class="card-address">📍 '+esc(p.address)+'</div>':'')
      +(p.desc?'<div class="card-desc">'+esc(p.desc)+'</div>':'')
      +'<div class="card-actions">'
      +'<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openDetailModal(\''+p.id+'\')">📋 详情</button>'
      +'<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEditModal(\''+p.id+'\')">✏️ 编辑</button>'
      +'<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();askDelete(\''+p.id+'\')">🗑️ 删除</button>'
      +'</div></div>';
  }).join('');
  document.getElementById('favChip').classList.toggle('active',favFilterOnly);
}
function highlightCard(id){
  document.querySelectorAll('.card.highlight').forEach(c=>c.classList.remove('highlight'));
  const el=document.getElementById('card-'+id);
  if(el){el.classList.add('highlight');el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>el.classList.remove('highlight'),2000);}
}
function focusPlace(id){
  const p=places.find(x=>x.id===id);if(!p)return;
  map.setView([p.lat,p.lng],16,{animate:true,duration:0.3});
  if(markers[id])markers[id].openPopup();
  highlightCard(id);
}

// ==================== ACTIONS ====================
function toggleFavorite(id){const p=places.find(x=>x.id===id);if(!p)return;p.favorited=!p.favorited;savePlaces();refreshMarkers();renderCards();showToast(p.favorited?'❤️ 已收藏':'已取消收藏');}
function askDelete(id){pendingDeleteId=id;document.getElementById('confirmMsg').textContent='确定要删除「'+places.find(p=>p.id===id)?.name+'」吗？';document.getElementById('confirmDialog').style.display='flex';}
function hideConfirm(){document.getElementById('confirmDialog').style.display='none';pendingDeleteId=null;}
function confirmDelete(){if(!pendingDeleteId)return;const id=pendingDeleteId;places=places.filter(p=>p.id!==id);if(markers[id]){map.removeLayer(markers[id]);delete markers[id];}savePlaces();renderCards();hideConfirm();if(document.getElementById('detailModal').style.display==='flex')closeDetailModal();showToast('🗑️ 已删除');}
function toggleSort(){sortMode=sortMode==='newest'?'distance':'newest';const el=document.getElementById('sortChip');el.textContent=sortMode==='distance'?'📍 由近到远':'🕐 最新';el.classList.toggle('active',sortMode==='distance');renderCards();}
function toggleFavFilter(){favFilterOnly=!favFilterOnly;const b=document.getElementById('btnShowFavorites');b.textContent=favFilterOnly?'❤️ 显示全部':'❤️ 只看收藏';b.classList.toggle('active',favFilterOnly);renderCards();}
function toggleMapExpand(){
  const mc=document.querySelector('.main-container');
  const btn=document.getElementById('mapExpandBtn');
  const expanded=!mc.classList.contains('map-expanded');
  if(expanded){mc.classList.add('map-expanded');}
  else{mc.classList.remove('map-expanded');}
  btn.textContent=expanded?'📋 查看列表':'🗺️ 全屏地图';
  setTimeout(()=>map.invalidateSize(),350);
}
// sidebar click in expanded mode to collapse back
document.querySelector('.sidebar').addEventListener('click',function(e){
  if(document.querySelector('.main-container.map-expanded') && e.target===this){
    toggleMapExpand();
  }
});
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.filter-chips .chip:not(.fav-filter)').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderCards();}

// ==================== MODALS ====================
function openAddModal(){editingId=null;document.getElementById('modalTitle').textContent='添加新地点';['formName','formImage','formAddress','formPhone','formDesc','formReview','formLat','formLng'].forEach(id=>document.getElementById(id).value='');document.getElementById('formCategory').value='restaurant';document.getElementById('formRating').value='4';document.getElementById('addModal').style.display='flex';}
function openEditModal(id){const p=places.find(x=>x.id===id);if(!p)return;editingId=id;document.getElementById('modalTitle').textContent='编辑地点';document.getElementById('formName').value=p.name;document.getElementById('formCategory').value=p.category;document.getElementById('formRating').value=p.rating;document.getElementById('formAddress').value=p.address||'';document.getElementById('formPhone').value=p.phone||'';document.getElementById('formImage').value=p.image||'';document.getElementById('formDesc').value=p.desc||'';document.getElementById('formReview').value=p.review||'';document.getElementById('formLat').value=p.lat;document.getElementById('formLng').value=p.lng;document.getElementById('addModal').style.display='flex';}
function closeModal(){document.getElementById('addModal').style.display='none';editingId=null;}
function savePlace(){
  const name=document.getElementById('formName').value.trim(),lat=parseFloat(document.getElementById('formLat').value),lng=parseFloat(document.getElementById('formLng').value);
  if(!name){showToast('⚠️ 请输入地点名称');return;}
  if(isNaN(lat)||isNaN(lng)){showToast('⚠️ 请点击地图获取坐标');return;}
  const ex=editingId?places.find(p=>p.id===editingId):null;
  const data={id:editingId||'u'+Date.now().toString(36),name,category:document.getElementById('formCategory').value,rating:parseInt(document.getElementById('formRating').value),address:document.getElementById('formAddress').value.trim(),phone:document.getElementById('formPhone').value.trim(),image:document.getElementById('formImage').value.trim(),desc:document.getElementById('formDesc').value.trim(),review:document.getElementById('formReview').value.trim(),lat,lng,favorited:ex?.favorited||false,createdAt:ex?.createdAt||Date.now()};
  if(editingId)places=places.map(p=>p.id===editingId?data:p);else places.push(data);
  savePlaces();refreshMarkers();renderCards();closeModal();
  showToast(editingId?'✅ 已更新':'✅ 已添加');
}

function openDetailModal(id){
  const p=places.find(x=>x.id===id);if(!p)return;
  const cl={restaurant:'🍽️ 餐厅',mall:'🛍️ 商场',entertainment:'🎮 娱乐'}[p.category];
  const ci={restaurant:'🍽️',mall:'🛍️',entertainment:'🎮'}[p.category];
  const cic={restaurant:'icon-restaurant',mall:'icon-mall',entertainment:'icon-entertainment'}[p.category];
  const rt=fmtRoute(p);
  let h='';
  if(p.image)h+='<img src="'+esc(p.image)+'" alt="'+esc(p.name)+'" class="detail-image" onerror="this.style.display=\'none\'" onclick="window.open(\''+esc(p.image)+'\')">';
  else h+='<div class="detail-image-placeholder">🖼️</div>';
  h+='<div class="detail-header"><div class="icon-circle '+cic+'">'+ci+'</div><div><h2 style="margin:0 0 4px;">'+esc(p.name)+'</h2><span style="font-size:12px;background:#FFF0F3;color:#E8577B;padding:2px 8px;border-radius:8px;">'+cl+'</span></div></div>';
  h+='<div class="route-info-bar"><div class="route-info-item">🚗 驾车约 '+rt.driveLabel+'</div><div class="route-info-item">🚶 步行约 '+rt.walkLabel+'</div><div class="route-info-item">📍 直线 '+rt.distKm+' km</div></div>';
  h+='<div class="detail-section"><h3>评分</h3><p>'+'⭐'.repeat(p.rating)+' '+p.rating+'/5 分</p></div>';
  if(p.address)h+='<div class="detail-section"><h3>📍 地址</h3><p>'+esc(p.address)+'</p></div>';
  if(p.phone)h+='<div class="detail-section"><h3>📞 电话</h3><p>'+esc(p.phone)+'</p></div>';
  if(p.desc)h+='<div class="detail-section"><h3>📝 简介</h3><p>'+esc(p.desc)+'</p></div>';
  if(p.review)h+='<div class="detail-section"><h3>💬 用户评价</h3><div class="review-card">'+esc(p.review)+'<div class="review-source">来自小红书 / 大众点评</div></div></div>';
  if(p.image)h+='<div class="detail-section"><h3>🖼️ 图片</h3><p style="font-size:11px;color:var(--text-light);">点击图片查看大图 | 右击可复制链接</p></div>';
  else h+='<div class="detail-section"><p style="font-size:12px;color:var(--text-light);">💡 编辑可添加图片URL（小红书/大众点评右击图片→复制地址）</p></div>';
  h+='<div class="modal-actions">';
  h+='<button class="btn btn-outline" onclick="toggleFavorite(\''+p.id+'\');openDetailModal(\''+p.id+'\')">'+(p.favorited?'❤️ 取消收藏':'🤍 收藏')+'</button>';
  h+='<button class="btn btn-outline" onclick="closeDetailModal();openEditModal(\''+p.id+'\')">✏️ 编辑</button>';
  h+='<button class="btn btn-danger" onclick="closeDetailModal();askDelete(\''+p.id+'\')">🗑️ 删除</button>';
  h+='<button class="btn btn-primary" onclick="closeDetailModal()">关闭</button></div>';
  document.getElementById('detailContent').innerHTML=h;
  document.getElementById('detailModal').style.display='flex';
}
function closeDetailModal(){document.getElementById('detailModal').style.display='none';}

document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeDetailModal();});
document.addEventListener('keydown',function(e){
  if(e.key!=='Escape')return;
  if(document.getElementById('confirmDialog').style.display==='flex'){hideConfirm();return;}
  if(document.getElementById('detailModal').style.display==='flex'){closeDetailModal();return;}
  if(document.getElementById('addModal').style.display==='flex'){closeModal();return;}
});

// ==================== UTILS ====================
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function showToast(m){const x=document.querySelector('.toast');if(x)x.remove();const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
function downloadPage(){
  const html=document.documentElement.outerHTML;
  const blob=new Blob(['<!DOCTYPE html>\n'+html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='空港辰院_周边生活地图.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('📥 下载完成！可在手机浏览器中打开');
}

// ==================== INIT ====================
refreshMarkers();renderCards();loadDistricts();
setTimeout(enrichRoutes,3000);

const allCoords=places.map(p=>[p.lat,p.lng]);allCoords.push([HOME_LAT,HOME_LNG]);
map.fitBounds(allCoords,{padding:[30,30],maxZoom:12});

console.log('🏠 空港辰院 · 周边生活地图 v4 已就绪');
console.log('📍 共 '+places.length+' 个地点 | 🟣 郑州八区+航空港区 | 💾 localStorage');
console.log('🍽️ 2025大众点评必吃榜+小红书热门 | 🏬 2025新开商场 | 🎮 网红打卡地');
</script>
